version: '3.8'

services:
  relayer:
    build: .
    container_name: ewei-relayer
    restart: unless-stopped
    ports:
      - '3100:3100'
      - '9090:9090'
    environment:
      NODE_ENV: production
      PORT: 3100
      BSC_RPC_URL: ${BSC_RPC_URL}
      BSC_RPC_URL_FALLBACK: ${BSC_RPC_URL_FALLBACK:-}
      BSC_CHAIN_ID: 56
      RELAYER_PRIVATE_KEY: ${RELAYER_PRIVATE_KEY}
      EWEI_FORWARDER_ADDRESS: ${EWEI_FORWARDER_ADDRESS}
      EWEI_POLICY_REGISTRY_ADDRESS: ${EWEI_POLICY_REGISTRY_ADDRESS}
      DATABASE_URL: postgres://ewei:${POSTGRES_PASSWORD:-ewei_secret}@postgres:5432/ewei_relayer
      REDIS_URL: redis://redis:6379
      METRICS_ENABLED: 'true'
      METRICS_PORT: 9090
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ewei

  postgres:
    image: postgres:16-alpine
    container_name: ewei-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ewei_relayer
      POSTGRES_USER: ewei
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ewei_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ewei -d ewei_relayer']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ewei

  redis:
    image: redis:7-alpine
    container_name: ewei-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ewei

volumes:
  postgres_data:
  redis_data:

networks:
  ewei:
    driver: bridge
